name: Cleanup Preview Dives

permissions:
  contents: read

on:
  delete:

jobs:
  cleanup:
    name: Delete preview dives for branch
    if: github.event.ref_type == 'branch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: opt-nc/setup-duckdb-action@v1.2.8
        with:
          version: v1.5.2
      - name: Cleanup preview dives
        shell: bash
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          BRANCH_NAME: ${{ github.event.ref }}
        run: |
          PREVIEW_DIVE_IDS=$(duckdb md: -csv -noheader -c "SELECT id FROM MD_LIST_DIVES() WHERE title LIKE '%:${BRANCH_NAME} (Preview)'")
          if [ -z "$PREVIEW_DIVE_IDS" ]; then
            echo "No preview dives found for branch '${BRANCH_NAME}'"
            exit 0
          fi
          while IFS= read -r DIVE_ID; do
            echo "Deleting preview dive ${DIVE_ID}"
            duckdb md: -csv -noheader -c "FROM MD_DELETE_DIVE(id='${DIVE_ID}'::UUID)"
          done <<< "$PREVIEW_DIVE_IDS"
