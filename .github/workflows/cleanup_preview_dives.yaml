name: Cleanup Preview Dives

permissions:
  contents: read

on:
  delete:

jobs:
  cleanup:
    name: Delete preview dives for branch
    if: github.event.ref_type == 'branch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cleanup preview dives
        shell: bash
        env:
          motherduck_token: ${{ secrets.MOTHERDUCK_TOKEN }}
          BRANCH_NAME: ${{ github.event.ref }}
        run: |
          curl -s https://install.motherduck.com | sh
          DUCKDB_VERSION=$(curl -sf https://api.motherduck.com/latest_supported_duckdb_version.txt)
          if [ -n "$DUCKDB_VERSION" ]; then
            CLI_PATH="${HOME}/.duckdb/cli/${DUCKDB_VERSION}/duckdb"
          else
            CLI_PATH=${HOME}/.duckdb/cli/*/duckdb
          fi
          echo "Using DuckDB CLI at: ${CLI_PATH}"
          if [ ! -x "${CLI_PATH}" ]; then
            echo "DuckDB CLI not found at expected path '${CLI_PATH}'"
            exit 1
          fi
          PREVIEW_DIVE_IDS=$(${CLI_PATH} md: -csv -noheader -c "SELECT id FROM MD_LIST_DIVES() WHERE title LIKE '%:${BRANCH_NAME} (Preview)'")
          if [ -z "$PREVIEW_DIVE_IDS" ]; then
            echo "No preview dives found for branch '${BRANCH_NAME}'"
            exit 0
          fi
          while IFS= read -r DIVE_ID; do
            echo "Deleting preview dive ${DIVE_ID}"
            ${CLI_PATH} md: -csv -noheader -c "FROM MD_DELETE_DIVE(id='${DIVE_ID}'::UUID)"
          done <<< "$PREVIEW_DIVE_IDS"
